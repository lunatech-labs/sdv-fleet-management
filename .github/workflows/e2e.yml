name: E2E

on:
  push:
    branches: [main]
    paths:
      - e2e/**
      - frontend/**
      - backend/**
      - kuksa2mqtt/**
      - seed/**
      - mosquitto/**
      - docker-compose.yml

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/health > /dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 2
          done
          echo "backend did not become ready"; exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 2
          done
          echo "frontend did not become ready"; exit 1

      - name: Wait for MQTT data to populate
        run: sleep 5

      - name: Run Playwright tests
        working-directory: e2e
        run: npm test

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
