  # ── Rust backend ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      MQTT_HOST:     mosquitto
      MQTT_PORT:     "1883"
      VEHICLES_FILE: /app/vehicles.json
      HAWKBIT_URL:      http://hawkbit:8080
      HAWKBIT_USER:     ${HAWKBIT_USER:-admin}
      HAWKBIT_PASSWORD: ${HAWKBIT_PASSWORD:-admin}
    volumes:
      - ./seed/vehicles.json:/app/vehicles.json:ro
    depends_on:
      mosquitto:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
      hawkbit:
        condition: service_healthy

  # ── Vue 3 frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - backend
