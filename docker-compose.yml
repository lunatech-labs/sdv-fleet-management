services:

  # ── MQTT broker ────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kuksa Databrokers (one per vehicle) ────────────────────────────────────
  databroker-01:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    command: ["--insecure"]
    ports: ["55556:55555"]

  databroker-02:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    command: ["--insecure"]
    ports: ["55557:55555"]

