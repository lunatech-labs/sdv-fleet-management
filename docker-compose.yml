# build + image together: BuildKit deduplicates the build across all 20 sidecars
# and tags the result as kuksa2mqtt:local, preventing a Docker Hub pull on first run.
x-sidecar-defaults: &sidecar-defaults
  build: ./kuksa2mqtt
  image: kuksa2mqtt:local
  depends_on:
    mosquitto:
      condition: service_healthy
    seed:
      condition: service_completed_successfully
  restart: on-failure

# Same BuildKit dedup pattern as x-sidecar-defaults, one image shared by 20 agents.
x-ota-agent-defaults: &ota-agent-defaults
  build: ./ota-agent
  image: ota-agent:local
  depends_on:
    mosquitto:
      condition: service_healthy
    # ota-agents self-register against HawkBit DDI on startup — wait until
    # HawkBit is healthy so the first request doesn't have to burn retries.
    hawkbit:
      condition: service_healthy
  restart: on-failure

services:

  # ── MQTT broker ────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kuksa Databrokers (one per vehicle) ────────────────────────────────────
  databroker-01:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    command: ["--insecure"]
    ports: ["55556:55555"]

