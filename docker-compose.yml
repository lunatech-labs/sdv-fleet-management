  databroker-20:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    command: ["--insecure"]
    ports: ["55575:55555"]

  # ── Seed script ────────────────────────────────────────────────────────────
  # Connects to each databroker and writes static VSS signals + initial GPS.
  # Retries gRPC connections internally; exits 0 on success.
  seed:
    build: ./seed
    depends_on:
      - databroker-01
      - databroker-02
      - databroker-03
      - databroker-04
      - databroker-05
      - databroker-06
      - databroker-07
      - databroker-08
      - databroker-09
      - databroker-10
      - databroker-11
      - databroker-12
      - databroker-13
      - databroker-14
      - databroker-15
      - databroker-16
      - databroker-17
      - databroker-18
      - databroker-19
      - databroker-20
    restart: "no"

  # ── kuksa2mqtt sidecars (one per vehicle) ──────────────────────────────────
  # kuksa2mqtt-01 builds the image; all other sidecars reuse kuksa2mqtt:local.
  # To rebuild: docker compose build kuksa2mqtt-01
  kuksa2mqtt-01:
    <<: *sidecar-defaults
    build: ./kuksa2mqtt
    environment:
      KUKSA_HOST: databroker-01
      KUKSA_PORT: "55555"
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      VEHICLE_VIN:   VIN-0001
      VEHICLE_BRAND: Toyota
      VEHICLE_MODEL: Camry
      VEHICLE_LAT:   "48.8566"
      VEHICLE_LON:   "2.3522"

